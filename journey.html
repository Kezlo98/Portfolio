<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey - Son BIP</title>
  <meta name="description" content="Son BIP's journey: a quiet path of milestones, from the first Shopify app to the road ahead." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data/sonbip.png" />
  <link rel="stylesheet" href="assets/css/ghibli.css" />
  <script type="importmap">
    { "imports": { "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.mjs" } }
  </script>
</head>
<body>
  <div class="scene" id="scene" aria-hidden="true">
    <div class="layer bg" style="background-image:url('assets/img/ghibli-journey.jpg'); --depth:.12"></div>
    <div class="scrim"></div>
    <div class="vignette"></div>
  </div>
  <canvas id="atmos" aria-hidden="true"></canvas>
  <div class="grain"></div>

  <div class="content">
    <nav class="nav">
      <a class="brand" href="index.html">Son BIP</a>
      <ul>
        <li><a class="link" href="index.html">Home</a></li>
        <li><a class="link active" href="journey.html">Journey</a></li>
        <li><a class="link" href="finance.html">Finance</a></li>
      </ul>
    </nav>

    <main class="page">
      <div class="page-head">
        <h1>Journey</h1>
        <p>A quiet path of milestones, one release at a time.</p>
      </div>

      <section class="panel">
        <div class="tl" id="tl"></div>
      </section>
    </main>

    <footer class="foot">© 2026 Son BIP · built in public</footer>
  </div>

  <script type="module">
    import { loadJSON, formatDate, countdownTo, pad2 } from "./assets/js/game-lib.js";
    import { mountAtmosphere } from "./assets/js/atmosphere.js";
    import { initReveal } from "./assets/js/reveal.js";
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

    const journey = await loadJSON("data/journey.json");
    const ms = (journey?.milestones ?? []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
    const now = Date.now();
    const tl = document.getElementById("tl");

    ms.forEach((m) => {
      const future = new Date(m.date) > now;
      const item = document.createElement("div");
      item.className = "tl-item" + (future ? " future" : "");
      item.dataset.reveal = "";
      const tags = (m.tags || []).map((t) => `<span class="tag">${t}</span>`).join("");
      item.innerHTML = `
        <div class="tl-card">
          <p class="tl-date">${formatDate(m.date)}</p>
          <h3 class="tl-title">${m.title}</h3>
          <p class="tl-desc">${m.description}</p>
          <div class="tags">${tags}</div>
          ${future ? `<div class="countdown" id="cd-${m.id}"></div>` : ""}
        </div>`;
      tl.appendChild(item);

      if (future) {
        const el = item.querySelector(`#cd-${m.id}`);
        const tick = () => { const c = countdownTo(m.date); el.textContent = `Final boss in ${pad2(c.days)}d ${pad2(c.hours)}h ${pad2(c.mins)}m ${pad2(c.secs)}s`; };
        tick();
        if (!reduce) setInterval(tick, 1000);
      }
    });
    initReveal();

    // pointer parallax
    const scene = document.getElementById("scene");
    let tx = 0, ty = 0, cx = 0, cy = 0, raf = 0;
    function apply() {
      cx += (tx - cx) * 0.12; cy += (ty - cy) * 0.12;
      scene.style.setProperty("--mx", cx.toFixed(3)); scene.style.setProperty("--my", cy.toFixed(3));
      if (Math.abs(tx - cx) > 0.001 || Math.abs(ty - cy) > 0.001) raf = requestAnimationFrame(apply); else raf = 0;
    }
    if (!reduce) addEventListener("pointermove", (e) => { tx = e.clientX / innerWidth - 0.5; ty = e.clientY / innerHeight - 0.5; if (!raf) raf = requestAnimationFrame(apply); }, { passive: true });

    mountAtmosphere({ page: "journey", canvas: document.getElementById("atmos") }).catch((e) => console.warn("atmosphere:", e));
  </script>
</body>
</html>
