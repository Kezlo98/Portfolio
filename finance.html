<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance - Son BIP</title>
  <meta name="description" content="Son BIP's finance: real balance, income, and an honest $1,000,000 goal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data/sonbip.png" />
  <link rel="stylesheet" href="assets/css/ghibli.css" />
  <script type="importmap">
    { "imports": { "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.mjs" } }
  </script>
</head>
<body>
  <div class="scene" id="scene" aria-hidden="true">
    <div class="layer bg" style="background-image:url('assets/img/ghibli-finance.png'); --depth:.12"></div>
    <div class="scrim"></div>
    <div class="vignette"></div>
  </div>
  <canvas id="atmos" aria-hidden="true"></canvas>
  <div class="grain"></div>

  <div class="content">
    <nav class="nav">
      <a class="brand" href="index.html">Son BIP</a>
      <ul>
        <li><a class="link" href="index.html">Home</a></li>
        <li><a class="link" href="journey.html">Journey</a></li>
        <li><a class="link active" href="finance.html">Finance</a></li>
        <li><a class="link" href="carousel-draft.html">Carousel Draft</a></li>
      </ul>
    </nav>

    <main class="page">
      <div class="page-head">
        <h1>Finance</h1>
        <p>Real numbers, kept honest.</p>
      </div>

      <section class="panel">
        <div class="stats" id="stats"></div>
        <div class="progress">
          <div class="top"><span class="lab">Road to $1,000,000</span><span class="pct" id="pct"></span></div>
          <div class="bar"><i id="bar"></i></div>
        </div>
        <div class="ledger">
          <h3>Transactions</h3>
          <div class="filters" id="filters">
            <button class="tab active" data-f="all">All</button>
            <button class="tab" data-f="income">Income</button>
            <button class="tab" data-f="expense">Expense</button>
          </div>
          <div class="blog" id="blog"></div>
        </div>
      </section>
    </main>

    <footer class="foot">© 2026 Son BIP · numbers are real. yes, really. · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></footer>
  </div>

  <script type="module">
    import { loadJSON, deriveGame, formatCurrency } from "./assets/js/game-lib.js";
    import { mountAtmosphere } from "./assets/js/atmosphere.js";
    import { initReveal } from "./assets/js/reveal.js";
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

    const [journey, finance] = await Promise.all([loadJSON("data/journey.json"), loadJSON("data/finance.json")]);
    const g = deriveGame(journey, finance);
    const txs = (finance?.transactions ?? []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));

    // stats
    const net = g.income - (finance?.summary?.totalDonations ?? 0) - g.toolFees - g.expenses;
    const stats = [
      { l: "Balance", v: formatCurrency(g.balance), cls: "" },
      { l: "Income", v: formatCurrency(g.income), cls: "good" },
      { l: "Donations", v: formatCurrency(finance?.summary?.totalDonations ?? 0), cls: "" },
      { l: "Tool fees", v: formatCurrency(g.toolFees), cls: "bad" },
      { l: "Net", v: formatCurrency(net), cls: net >= 0 ? "good" : "bad" },
    ];
    document.getElementById("stats").innerHTML = stats.map((s) =>
      `<div class="stat" data-reveal><div class="l">${s.l}</div><div class="v ${s.cls}">${s.v}</div></div>`).join("");

    // goal progress
    document.getElementById("pct").textContent = g.goalPct.toFixed(4) + "%";
    requestAnimationFrame(() => { document.getElementById("bar").style.width = Math.max(1.2, g.goalPct) + "%"; });

    // ledger + filters
    const blog = document.getElementById("blog");
    function render(filter) {
      const list = filter === "all" ? txs : txs.filter((t) => t.type === filter);
      blog.innerHTML = list.length ? list.map((t) => `
        <div class="row">
          <span class="d">${new Date(t.date).toLocaleDateString("en-US", { month: "short", day: "2-digit" })}</span>
          <span class="desc">${t.description}</span>
          <span class="amt ${t.amount >= 0 ? "in" : "out"}">${formatCurrency(t.amount)}</span>
        </div>`).join("") : `<div class="row" style="justify-content:center;color:var(--ink-soft)">no transactions</div>`;
    }
    render("all");
    document.querySelectorAll("#filters .tab").forEach((b) => b.addEventListener("click", () => {
      document.querySelectorAll("#filters .tab").forEach((x) => x.classList.toggle("active", x === b));
      render(b.dataset.f);
    }));
    initReveal();

    // pointer parallax
    const scene = document.getElementById("scene");
    let tx2 = 0, ty2 = 0, cx = 0, cy = 0, raf = 0;
    function apply() {
      cx += (tx2 - cx) * 0.12; cy += (ty2 - cy) * 0.12;
      scene.style.setProperty("--mx", cx.toFixed(3)); scene.style.setProperty("--my", cy.toFixed(3));
      if (Math.abs(tx2 - cx) > 0.001 || Math.abs(ty2 - cy) > 0.001) raf = requestAnimationFrame(apply); else raf = 0;
    }
    if (!reduce) addEventListener("pointermove", (e) => { tx2 = e.clientX / innerWidth - 0.5; ty2 = e.clientY / innerHeight - 0.5; if (!raf) raf = requestAnimationFrame(apply); }, { passive: true });

    mountAtmosphere({ page: "finance", canvas: document.getElementById("atmos") }).catch((e) => console.warn("atmosphere:", e));
  </script>
</body>
</html>
